description: >-
  Cadence Design Systems is a multinational electronic design automation
  (EDA) software and hardware company. Cadence provides tools for designing
  integrated circuits, systems on chips, printed circuit boards, and
  pharmaceutical drugs, with a portfolio that includes Virtuoso, Spectre,
  Genus, Innovus, JasperGold, Xcelium, Palladium, Allegro, OrCAD, and AI
  tools such as Cerebrus and ChipGPT.
