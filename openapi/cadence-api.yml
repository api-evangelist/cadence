openapi: 3.1.0
info:
  title: Cadence REST API
  description: >-
    The Cadence REST API provides HTTP endpoints for interacting with the Cadence
    workflow orchestration engine, including domain management, workflow execution,
    task list management, and visibility queries.
  version: 1.0.0
  contact:
    name: Cadence Workflow
    url: https://cadenceworkflow.io/
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: '{baseUrl}/api/v1'
    description: Cadence Server REST API
    variables:
      baseUrl:
        default: http://localhost:8088
paths:
  /domains:
    get:
      operationId: listDomains
      summary: List domains
      description: Returns a list of all registered domains.
      tags:
        - Domains
      parameters:
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: nextPageToken
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/Domain'
                  nextPageToken:
                    type: string
    post:
      operationId: registerDomain
      summary: Register a domain
      description: Registers a new domain in Cadence.
      tags:
        - Domains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDomainRequest'
      responses:
        '200':
          description: Domain registered
  /domains/{domainName}:
    get:
      operationId: describeDomain
      summary: Describe a domain
      description: Returns details of a specific domain.
      tags:
        - Domains
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
    put:
      operationId: updateDomain
      summary: Update a domain
      description: Updates configuration for a specific domain.
      tags:
        - Domains
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDomainRequest'
      responses:
        '200':
          description: Domain updated
  /domains/{domainName}/workflows:
    get:
      operationId: listOpenWorkflows
      summary: List open workflows
      description: Returns a list of open workflow executions in a domain.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: nextPageToken
          in: query
          schema:
            type: string
        - name: startTimeMin
          in: query
          schema:
            type: string
            format: date-time
        - name: startTimeMax
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowExecutionInfo'
                  nextPageToken:
                    type: string
  /domains/{domainName}/workflows/{workflowId}:
    get:
      operationId: describeWorkflow
      summary: Describe a workflow execution
      description: Returns details of a specific workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowExecutionDetail'
  /domains/{domainName}/workflows/{workflowId}/history:
    get:
      operationId: getWorkflowHistory
      summary: Get workflow history
      description: Returns the event history of a workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
        - name: runId
          in: query
          schema:
            type: string
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: nextPageToken
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/HistoryEvent'
                  nextPageToken:
                    type: string
  /domains/{domainName}/workflows/{workflowId}/terminate:
    post:
      operationId: terminateWorkflow
      summary: Terminate a workflow
      description: Terminates a running workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                runId:
                  type: string
      responses:
        '200':
          description: Workflow terminated
  /domains/{domainName}/workflows/{workflowId}/signal/{signalName}:
    post:
      operationId: signalWorkflow
      summary: Signal a workflow
      description: Sends a signal to a running workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
        - name: signalName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                signalInput:
                  type: object
                runId:
                  type: string
      responses:
        '200':
          description: Signal sent
  /domains/{domainName}/workflows/{workflowId}/cancel:
    post:
      operationId: cancelWorkflow
      summary: Cancel a workflow
      description: Requests cancellation of a running workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                runId:
                  type: string
      responses:
        '200':
          description: Cancellation requested
  /domains/{domainName}/workflows/{workflowId}/query/{queryType}:
    post:
      operationId: queryWorkflow
      summary: Query a workflow
      description: Queries a workflow execution for its current state.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: workflowId
          in: path
          required: true
          schema:
            type: string
        - name: queryType
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                queryArgs:
                  type: object
                runId:
                  type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  queryResult:
                    type: object
  /domains/{domainName}/workflows/start:
    post:
      operationId: startWorkflow
      summary: Start a workflow execution
      description: Starts a new workflow execution.
      tags:
        - Workflows
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartWorkflowRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: string
  /domains/{domainName}/task-lists/{taskList}:
    get:
      operationId: describeTaskList
      summary: Describe a task list
      description: Returns details about a task list including pollers.
      tags:
        - Task Lists
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: taskList
          in: path
          required: true
          schema:
            type: string
        - name: taskListType
          in: query
          schema:
            type: string
            enum:
              - decision
              - activity
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListDescription'
  /domains/{domainName}/workflow-search:
    get:
      operationId: searchWorkflows
      summary: Search workflows
      description: Search for workflows using a SQL-like query.
      tags:
        - Visibility
      parameters:
        - name: domainName
          in: path
          required: true
          schema:
            type: string
        - name: query
          in: query
          schema:
            type: string
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: nextPageToken
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  executions:
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowExecutionInfo'
                  nextPageToken:
                    type: string
components:
  schemas:
    Domain:
      type: object
      properties:
        domainInfo:
          type: object
          properties:
            name:
              type: string
            status:
              type: string
              enum:
                - REGISTERED
                - DEPRECATED
            description:
              type: string
            ownerEmail:
              type: string
            data:
              type: object
        configuration:
          type: object
          properties:
            workflowExecutionRetentionPeriodInDays:
              type: integer
            emitMetric:
              type: boolean
            archivalStatus:
              type: string
        replicationConfiguration:
          type: object
          properties:
            activeClusterName:
              type: string
            clusters:
              type: array
              items:
                type: object
                properties:
                  clusterName:
                    type: string
        isGlobalDomain:
          type: boolean
        failoverVersion:
          type: integer
          format: int64
    RegisterDomainRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        ownerEmail:
          type: string
        workflowExecutionRetentionPeriodInDays:
          type: integer
        isGlobalDomain:
          type: boolean
        clusters:
          type: array
          items:
            type: object
            properties:
              clusterName:
                type: string
        activeClusterName:
          type: string
        data:
          type: object
    UpdateDomainRequest:
      type: object
      properties:
        description:
          type: string
        ownerEmail:
          type: string
        configuration:
          type: object
        replicationConfiguration:
          type: object
        data:
          type: object
    WorkflowExecutionInfo:
      type: object
      properties:
        execution:
          type: object
          properties:
            workflowId:
              type: string
            runId:
              type: string
        type:
          type: object
          properties:
            name:
              type: string
        startTime:
          type: string
          format: date-time
        closeTime:
          type: string
          format: date-time
        closeStatus:
          type: string
          enum:
            - COMPLETED
            - FAILED
            - CANCELED
            - TERMINATED
            - CONTINUED_AS_NEW
            - TIMED_OUT
        historyLength:
          type: integer
          format: int64
    WorkflowExecutionDetail:
      type: object
      properties:
        executionConfiguration:
          type: object
          properties:
            taskList:
              type: object
            executionStartToCloseTimeoutSeconds:
              type: integer
            taskStartToCloseTimeoutSeconds:
              type: integer
        workflowExecutionInfo:
          $ref: '#/components/schemas/WorkflowExecutionInfo'
        pendingActivities:
          type: array
          items:
            type: object
        pendingDecision:
          type: object
    StartWorkflowRequest:
      type: object
      required:
        - workflowId
        - workflowType
        - taskList
      properties:
        workflowId:
          type: string
        workflowType:
          type: object
          properties:
            name:
              type: string
        taskList:
          type: object
          properties:
            name:
              type: string
        input:
          type: object
        executionStartToCloseTimeoutSeconds:
          type: integer
        taskStartToCloseTimeoutSeconds:
          type: integer
        identity:
          type: string
        requestId:
          type: string
        memo:
          type: object
        searchAttributes:
          type: object
    HistoryEvent:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        eventType:
          type: string
        attributes:
          type: object
    TaskListDescription:
      type: object
      properties:
        pollers:
          type: array
          items:
            type: object
            properties:
              lastAccessTime:
                type: string
                format: date-time
              identity:
                type: string
              ratePerSecond:
                type: number
        taskListStatus:
          type: object
